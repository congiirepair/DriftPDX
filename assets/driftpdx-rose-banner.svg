    <path class="floral" d="M122 180c22-56 78-88 138-76-18 10-34 24-46 44 32 4 60 22 78 52-30-2-56 6-78 24-6-22-16-36-34-44 0 24-8 44-24 62-10-24-18-42-34-62Z"/>
    <path class="leaf" d="M16 290c-34 20-56 50-64 90 34-4 62-18 86-42"/>
