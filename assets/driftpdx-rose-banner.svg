    <path class="floral" d="M238 168c12-74 68-126 144-128 76-2 136 48 148 120-24-16-48-24-76-24 18 30 22 60 10 92-26-26-56-38-90-42-8-20-18-34-36-46-8 22-22 40-42 54-10-24-24-46-58-26Z"/>
    <path class="leaf" d="M188 12c10-32 30-56 58-76-2 30-12 58-32 84"/>
    <path class="leaf" d="M296 0c24-20 54-30 90-28-16 26-42 42-74 50"/>
    <path class="leaf" d="M540 92c26-24 56-38 96-42-18 28-42 48-74 58"/>
  </g>

  <g transform="translate(480 330) rotate(-8)">
