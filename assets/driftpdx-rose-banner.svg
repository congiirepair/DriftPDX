  </g>

  <rect x="30" y="30" width="1664" height="551" class="outline"/>
  <rect x="40" y="40" width="1644" height="531" class="outline" opacity="0.82"/>

  <text x="862" y="354" text-anchor="middle" class="brand">DRIFT-PDX</text>

  <line x1="152" y1="418" x2="1572" y2="418" stroke="#fff" stroke-width="3" opacity="0.98"/>
  <line x1="152" y1="529" x2="1572" y2="529" stroke="#fff" stroke-width="3" opacity="0.98"/>

  <text x="162" y="505" class="tagline">SCALE RC DRIFT CIRCUIT - <tspan class="tagline-jp">&#x30DD;&#x30FC;&#x30C8;&#x30E9;&#x30F3;&#x30C9;&#x30C9;&#x30EA;&#x30D5;&#x30C8;</tspan></text>
</svg>
