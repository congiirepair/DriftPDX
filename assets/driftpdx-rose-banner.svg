<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1724 611" role="img" aria-labelledby="title desc">
  <title id="title">Drift PDX rose banner logo</title>
  <desc id="desc">Red Drift PDX banner with floral line art, double border, and bilingual subtitle.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a7131e"/>
      <stop offset="48%" stop-color="#cb1f2a"/>
      <stop offset="100%" stop-color="#a8141f"/>
    </linearGradient>
    <radialGradient id="glowLeft" cx="20%" cy="48%" r="60%">
      <stop offset="0%" stop-color="#f15a57" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#f15a57" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowRight" cx="82%" cy="44%" r="56%">
      <stop offset="0%" stop-color="#ff9361" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#ff9361" stop-opacity="0"/>
    </radialGradient>
    <pattern id="fan" width="96" height="64" patternUnits="userSpaceOnUse" patternTransform="rotate(-8)">
      <path d="M0 64 Q48 8 96 64" fill="none" stroke="#f7a16e" stroke-opacity="0.07" stroke-width="2"/>
      <path d="M0 48 Q48 -8 96 48" fill="none" stroke="#f7a16e" stroke-opacity="0.06" stroke-width="2"/>
      <path d="M0 80 Q48 24 96 80" fill="none" stroke="#f7a16e" stroke-opacity="0.05" stroke-width="2"/>
    </pattern>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <style>
      .outline {
        fill: none;
        stroke: #fff7f1;
        stroke-width: 3;
      }
      .floral {
        fill: none;
        stroke: #f6a173;
        stroke-width: 3;
        stroke-linecap: round;
        stroke-linejoin: round;
        opacity: 0.34;
      }
      .leaf {
        fill: none;
        stroke: #f6a173;
        stroke-width: 2.2;
        stroke-linecap: round;
        stroke-linejoin: round;
        opacity: 0.32;
      }
      .brand {
        fill: #fff;
        font-family: "Arial Black", Impact, Haettenschweiler, "Segoe UI", sans-serif;
        font-size: 248px;
        font-weight: 900;
        letter-spacing: -8px;
      }
      .tagline {
        fill: #fff;
        font-family: "Segoe UI", Arial, sans-serif;
        font-size: 48px;
        font-weight: 300;
        letter-spacing: 11px;
      }
      .tagline-jp {
        letter-spacing: 3px;
      }
    </style>
  </defs>

  <rect width="1724" height="611" fill="url(#bg)"/>
  <rect width="1724" height="611" fill="url(#glowLeft)"/>
  <rect width="1724" height="611" fill="url(#glowRight)"/>
  <rect x="0" y="0" width="1724" height="611" fill="url(#fan)" opacity="0.5"/>

  <g opacity="0.16" filter="url(#softGlow)">
    <circle cx="364" cy="234" r="184" fill="#f05a57"/>
    <circle cx="930" cy="250" r="196" fill="#df3c43"/>
    <circle cx="1480" cy="330" r="188" fill="#df3f46"/>
